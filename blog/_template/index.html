<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POST_TITLE — Ascent Blog</title>
  <meta name="description" content="POST_EXCERPT">
  <link rel="icon" type="image/png" href="../../img/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#FAFAF7;--text:#1a1a1c;--text2:#555;--text3:#888;--blue:#0071E3;--border:#e4e4e8}
    html{scroll-behavior:smooth}
    ::selection{background:rgba(0,113,227,.12)}
    body{
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      background:var(--bg);color:var(--text);
      -webkit-font-smoothing:antialiased;
    }

    nav{
      position:fixed;top:0;left:0;right:0;z-index:100;
      height:52px;padding:0 32px;
      display:flex;align-items:center;justify-content:space-between;
      background:rgba(250,250,247,.92);
      backdrop-filter:saturate(180%) blur(20px);
      -webkit-backdrop-filter:saturate(180%) blur(20px);
      border-bottom:0.5px solid rgba(0,0,0,.08);
    }
    .nav-logo{
      font-weight:800;font-size:18px;letter-spacing:-.3px;
      color:var(--text);text-decoration:none;
      display:flex;align-items:center;gap:8px;
    }
    .nav-logo img{width:26px;height:26px;border-radius:6px}
    .nav-links{display:flex;gap:24px;align-items:center}
    .nav-links a{
      text-decoration:none;color:var(--text3);
      font-size:13px;font-weight:500;transition:color .15s;
    }
    .nav-links a:hover{color:var(--text)}
    .btn-nav{
      padding:7px 16px;background:var(--text);color:#fff!important;
      border-radius:980px;font-size:12px;font-weight:600;
    }

    article{
      max-width:640px;margin:0 auto;
      padding:120px 32px 80px;
    }
    .post-meta{
      font-size:12px;font-weight:600;color:var(--text3);
      text-transform:uppercase;letter-spacing:.3px;
      margin-bottom:16px;
    }
    .post-meta a{color:var(--blue);text-decoration:none}
    .post-meta a:hover{text-decoration:underline}

    article h1{
      font-size:clamp(28px,4.5vw,40px);font-weight:800;
      letter-spacing:-1.5px;line-height:1.1;margin-bottom:24px;
    }

    .post-body p{
      font-size:17px;line-height:1.85;color:var(--text2);
      margin-bottom:20px;
    }
    .post-body p:last-child{margin-bottom:0}
    .post-body strong{color:var(--text);font-weight:600}
    .post-body em{font-style:italic}

    .post-body h2{
      font-size:24px;font-weight:800;letter-spacing:-.5px;
      margin-top:48px;margin-bottom:16px;line-height:1.15;
    }
    .post-body h3{
      font-size:18px;font-weight:700;letter-spacing:-.2px;
      margin-top:36px;margin-bottom:12px;
    }

    .post-body blockquote{
      margin:28px 0;padding:0 0 0 20px;
      border-left:3px solid var(--border);
      font-size:17px;color:var(--text2);line-height:1.8;
      font-style:italic;
    }

    .post-body ul,.post-body ol{
      margin:16px 0 20px 24px;
      font-size:17px;color:var(--text2);line-height:1.8;
    }
    .post-body li{margin-bottom:8px}

    .post-body a{color:var(--blue);text-decoration:underline;text-underline-offset:2px}
    .post-body a:hover{text-decoration:none}

    .post-body img{
      width:100%;border-radius:12px;margin:28px 0;
    }

    .post-cta{
      margin-top:56px;padding:32px;
      background:#f3f1ec;border-radius:14px;
      text-align:center;
    }
    .post-cta p{font-size:15px;color:var(--text2);margin-bottom:14px;line-height:1.6}
    .post-cta a{
      display:inline-flex;align-items:center;gap:6px;
      padding:10px 22px;background:var(--blue);color:#fff;
      border-radius:980px;text-decoration:none;
      font-size:14px;font-weight:600;
    }

    .back-link{
      display:block;margin-top:48px;
      font-size:14px;color:var(--text3);text-decoration:none;
    }
    .back-link:hover{color:var(--text)}

    footer{
      padding:20px 32px;border-top:1px solid var(--border);
      display:flex;justify-content:space-between;align-items:center;
      max-width:1200px;margin:0 auto;
      font-size:11px;color:var(--text3);
    }
    footer a{color:var(--text3);text-decoration:none}
    .foot-links{display:flex;gap:16px}

    @media(max-width:600px){
      article{padding:100px 20px 60px}
      nav{padding:0 20px}
      .nav-links a:not(.btn-nav){display:none}
    }
  </style>
</head>
<body>

  <nav>
    <a href="../../" class="nav-logo"><img src="../../img/icon.png" alt="Ascent">Ascent</a>
    <div class="nav-links">
      <a href="../">Blog</a>
      <a href="https://apps.apple.com/us/app/ascent-habit-builder/id6756843194" class="btn-nav">Get the App</a>
    </div>
  </nav>

  <article>
    <div class="post-meta">
      <a href="../">← Blog</a> · POST_DATE
    </div>
    <h1>POST_TITLE</h1>
    <div class="post-body">

      <!-- WRITE YOUR POST HERE -->
      <p>Your content goes here.</p>

    </div>

    <div class="post-cta">
      <p>Ascent is the habit app designed for distracted brains. Free to try.</p>
      <a href="https://apps.apple.com/us/app/ascent-habit-builder/id6756843194">Try Ascent →</a>
    </div>

    <a href="../" class="back-link">← All posts</a>
  </article>

  <footer>
    <span>© 2026 Ascent</span>
    <div class="foot-links">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
    </div>
  </footer>

</body>
</html>
