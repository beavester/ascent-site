<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Ascent</title>
  <meta name="description" content="Notes on habit building, dopamine, and designing systems for distracted brains. From the team behind Ascent — the habit app for ADHD.">
  <link rel="canonical" href="https://habitbuilding.xyz/blog/">
  <link rel="icon" type="image/png" href="../img/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#FAFAF7;--text:#1a1a1c;--text2:#555;--text3:#888;
      --blue:#0071E3;--border:#e4e4e8;
    }
    html{scroll-behavior:smooth}
    ::selection{background:rgba(0,113,227,.12)}
    body{
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      background:var(--bg);color:var(--text);
      -webkit-font-smoothing:antialiased;overflow-x:hidden;
    }

    nav{
      position:fixed;top:0;left:0;right:0;z-index:100;
      height:52px;padding:0 32px;
      display:flex;align-items:center;justify-content:space-between;
      background:rgba(250,250,247,.92);
      backdrop-filter:saturate(180%) blur(20px);
      -webkit-backdrop-filter:saturate(180%) blur(20px);
      border-bottom:0.5px solid rgba(0,0,0,.08);
    }
    .nav-logo{
      font-weight:800;font-size:18px;letter-spacing:-.3px;
      color:var(--text);text-decoration:none;
      display:flex;align-items:center;gap:8px;
    }
    .nav-logo img{width:26px;height:26px;border-radius:6px}
    .nav-links{display:flex;gap:24px;align-items:center}
    .nav-links a{
      text-decoration:none;color:var(--text3);
      font-size:13px;font-weight:500;transition:color .15s;
    }
    .nav-links a:hover{color:var(--text)}
    .nav-links a.active{color:var(--text)}
    .btn-nav{
      padding:7px 16px;background:var(--text);color:#fff!important;
      border-radius:980px;font-size:12px;font-weight:600;
    }

    .blog-header{
      padding:120px 32px 48px;
      max-width:720px;margin:0 auto;
    }
    .blog-header h1{
      font-size:clamp(32px,5vw,48px);font-weight:800;
      letter-spacing:-2px;line-height:1.08;margin-bottom:12px;
    }
    .blog-header p{
      font-size:17px;color:var(--text2);line-height:1.6;
    }

    .post-list{
      max-width:720px;margin:0 auto;
      padding:0 32px 120px;
    }
    .post-card{
      display:block;text-decoration:none;color:inherit;
      padding:32px 0;border-bottom:1px solid var(--border);
      transition:opacity .15s;
    }
    .post-card:first-child{border-top:1px solid var(--border)}
    .post-card:hover{opacity:.7}
    .post-date{
      font-size:12px;font-weight:600;color:var(--text3);
      letter-spacing:.3px;margin-bottom:8px;
      text-transform:uppercase;
    }
    .post-card h2{
      font-size:22px;font-weight:700;letter-spacing:-.3px;
      line-height:1.25;margin-bottom:6px;
    }
    .post-card p{
      font-size:15px;color:var(--text2);line-height:1.6;
    }

    .empty-state{
      padding:64px 0;text-align:center;
      color:var(--text3);font-size:15px;
    }

    footer{
      padding:20px 32px;border-top:1px solid var(--border);
      display:flex;justify-content:space-between;align-items:center;
      max-width:1200px;margin:0 auto;
      font-size:11px;color:var(--text3);
    }
    footer a{color:var(--text3);text-decoration:none}
    footer a:hover{color:var(--text2)}
    .foot-links{display:flex;gap:16px}

    @media(max-width:600px){
      .blog-header{padding:100px 20px 36px}
      .post-list{padding:0 20px 80px}
      .nav-links a:not(.btn-nav){display:none}
      nav{padding:0 20px}
    }
  </style>
</head>
<body>

  <nav>
    <a href="../" class="nav-logo"><img src="../img/icon.png" alt="Ascent">Ascent</a>
    <div class="nav-links">
      <a href="../#how">How It Works</a>
      <a href="./" class="active">Blog</a>
      <a href="https://testflight.apple.com/join/TMkKkQcz" class="btn-nav">Get the App</a>
    </div>
  </nav>

  <div class="blog-header">
    <h1>Notes on habit building</h1>
    <p>Findings on dopamine, attention, and building systems for brains that weren't designed for the modern world.</p>
  </div>

  <div class="post-list" id="posts">
    <!-- Posts go here. Each post is a folder: blog/post-slug/index.html -->
    <!-- Add new posts by creating the folder + adding an entry below -->
  </div>

  <footer>
    <span>© 2026 Ascent</span>
    <div class="foot-links">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
    </div>
  </footer>

  <script>
    // Post index — add new posts here, newest first
    const posts = [
      {
        slug: "youre-not-unmotivated",
        title: "You're Not Unmotivated. You're Desensitized.",
        date: "2026-02-15",
        excerpt: "Motivation isn't a resource you generate. It's a signal you've stopped being able to hear."
      },
    ];

    const list = document.getElementById('posts');
    if (posts.length === 0) {
      list.innerHTML = '<div class="empty-state">First post coming soon.</div>';
    } else {
      list.innerHTML = posts.map(p => `
        <a href="${p.slug}/" class="post-card">
          <div class="post-date">${new Date(p.date+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
          <h2>${p.title}</h2>
          <p>${p.excerpt}</p>
        </a>
      `).join('');
    }
  </script>

</body>
</html>
